apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-gmail
  namespace: llmmllab-mcp
  labels:
    app: mcp-server-gmail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server-gmail
  template:
    metadata:
      labels:
        app: mcp-server-gmail
    spec:
      serviceAccountName: mcp-server-gmail
      containers:
        - name: mcp-server-gmail
          image: 192.168.0.71:31500/mcp-server-gmail:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            # --- OAuth / Dex configuration ---
            # Setting MCP_SERVER_BASE_URL activates OAuth (see server.py)
            # Must be HTTPS — the public URL clients and browsers use.
            # TLS is terminated at the gateway; the pod runs plain HTTP.
            - name: MCP_SERVER_BASE_URL
              value: "https://mcp.longstorymedia.com"
            - name: DEX_ISSUER
              value: "https://auth.longstorymedia.com"
            - name: DEX_INTERNAL_URL
              value: "http://dex.auth.svc.cluster.local:5556"
            - name: OAUTH_CLIENT_ID
              value: "gmail-mcp-client"
            - name: OAUTH_JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: gmail-mcp-oauth
                  key: jwt-signing-key
            # --- Gmail token source configuration ---
            - name: GMAIL_TOKEN_SOURCE
              value: "k8s"
            - name: K8S_TOKEN_MOUNT_PATH
              value: "/var/run/gmail-token"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: gmail-token-secret
              mountPath: /var/run/gmail-token
              readOnly: false
            - name: gmail-jobs
              mountPath: /home/mcp/.gmail-jobs
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: gmail-token-secret
          secret:
            secretName: gmail-secrets
        - name: gmail-jobs
          persistentVolumeClaim:
            claimName: gmail-jobs-pvc
      imagePullSecrets:
        - name: registry-secret
      nodeSelector:
        kubernetes.io/arch: arm64

---
# Service for Gmail MCP Server (internal cluster access)
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-gmail
  namespace: llmmllab-mcp
  labels:
    app: mcp-server-gmail
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: mcp-server-gmail

---
# PVC for Gmail OAuth tokens (persisted after OAuth flow)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gmail-tokens-pvc
  namespace: llmmllab-mcp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi

---
# PVC for Gmail scheduled jobs persistence
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gmail-jobs-pvc
  namespace: llmmllab-mcp
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Mi

---
# ServiceAccount for Gmail MCP Server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server-gmail
  namespace: llmmllab-mcp

---
# Role allowing the pod to patch the gmail-secrets secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-server-gmail-secret-access
  namespace: llmmllab-mcp
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["gmail-secrets"]
    verbs: ["get", "patch", "update"]

---
# RoleBinding to grant the ServiceAccount the Role permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-server-gmail-secret-access
  namespace: llmmllab-mcp
subjects:
  - kind: ServiceAccount
    name: mcp-server-gmail
    namespace: llmmllab-mcp
roleRef:
  kind: Role
  name: mcp-server-gmail-secret-access
  apiGroup: rbac.authorization.k8s.io
